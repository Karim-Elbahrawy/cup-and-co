<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Spinach Feta Wrap">

    <defs>
      <radialGradient id="bg" cx="50%" cy="40%" r="80%">
        <stop offset="0%" stop-color="#A7E5DC"/>
        <stop offset="100%" stop-color="#0F766E"/>
      </radialGradient>
      <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="6"/>
      </filter>
    </defs>
    <rect width="600" height="600" fill="url(#bg)"/>
    <!-- Subtle noise texture via opacity dots -->
    <g fill="#FEF3C7" opacity="0.05">
      <circle cx="60" cy="80" r="2"/><circle cx="540" cy="120" r="3"/><circle cx="180" cy="540" r="2"/>
      <circle cx="450" cy="480" r="2"/><circle cx="120" cy="260" r="2"/><circle cx="500" cy="320" r="3"/>
    </g>
  

    <g filter="url(#soft-shadow)" opacity="0.18"><ellipse cx="300" cy="450" rx="160" ry="16" fill="#1C1917"/></g>
    <g transform="translate(300,300)">
      <path d="M -150 -50 L 150 -50 L 130 80 L -130 80 Z" fill="#A7E5DC" stroke="#1C1917" stroke-width="3"/>
      <!-- Spinach + filling at the open end -->
      <path d="M -130 -50 L 130 -50 L 120 -20 L -120 -20 Z" fill="#0F766E" opacity="0.75"/>
      <circle cx="-50" cy="-35" r="8" fill="#FEF3C7"/>
      <circle cx="20" cy="-30" r="8" fill="#FEF3C7"/>
      <circle cx="80" cy="-38" r="6" fill="#FEF3C7"/>
    </g>
  <!-- Brand badge -->
  <g transform="translate(540,560)">
    <circle cx="0" cy="0" r="24" fill="#FEF3C7" opacity="0.95"/>
    <circle cx="0" cy="0" r="14" fill="#1C1917"/>
  </g>
</svg>
