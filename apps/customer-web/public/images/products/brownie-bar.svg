<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Brownie Bar">

    <defs>
      <radialGradient id="bg" cx="50%" cy="40%" r="80%">
        <stop offset="0%" stop-color="#FFD9C2"/>
        <stop offset="100%" stop-color="#E07856"/>
      </radialGradient>
      <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="6"/>
      </filter>
    </defs>
    <rect width="600" height="600" fill="url(#bg)"/>
    <!-- Subtle noise texture via opacity dots -->
    <g fill="#FEF3C7" opacity="0.05">
      <circle cx="60" cy="80" r="2"/><circle cx="540" cy="120" r="3"/><circle cx="180" cy="540" r="2"/>
      <circle cx="450" cy="480" r="2"/><circle cx="120" cy="260" r="2"/><circle cx="500" cy="320" r="3"/>
    </g>
  

    <g filter="url(#soft-shadow)" opacity="0.18"><rect x="180" y="380" width="240" height="20" rx="10" fill="#1C1917"/></g>
    <g transform="translate(300,300)">
      <rect x="-130" y="-50" width="260" height="100" rx="14" fill="#1C1917"/>
      <rect x="-130" y="-50" width="260" height="20" rx="14" fill="#E07856" opacity="0.9"/>
      <!-- Chocolate chunks -->
      <rect x="-100" y="-25" width="40" height="20" rx="4" fill="#E07856"/>
      <rect x="-30" y="-15" width="35" height="20" rx="4" fill="#E07856"/>
      <rect x="50" y="-22" width="42" height="22" rx="4" fill="#E07856"/>
    </g>
  <!-- Brand badge -->
  <g transform="translate(540,560)">
    <circle cx="0" cy="0" r="24" fill="#FEF3C7" opacity="0.95"/>
    <circle cx="0" cy="0" r="14" fill="#1C1917"/>
  </g>
</svg>
