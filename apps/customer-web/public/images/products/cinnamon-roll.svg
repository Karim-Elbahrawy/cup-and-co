<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Cinnamon Roll">

    <defs>
      <radialGradient id="bg" cx="50%" cy="40%" r="80%">
        <stop offset="0%" stop-color="#FFD9C2"/>
        <stop offset="100%" stop-color="#E07856"/>
      </radialGradient>
      <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="6"/>
      </filter>
    </defs>
    <rect width="600" height="600" fill="url(#bg)"/>
    <!-- Subtle noise texture via opacity dots -->
    <g fill="#FEF3C7" opacity="0.05">
      <circle cx="60" cy="80" r="2"/><circle cx="540" cy="120" r="3"/><circle cx="180" cy="540" r="2"/>
      <circle cx="450" cy="480" r="2"/><circle cx="120" cy="260" r="2"/><circle cx="500" cy="320" r="3"/>
    </g>
  

    <g filter="url(#soft-shadow)" opacity="0.18"><ellipse cx="300" cy="430" rx="140" ry="16" fill="#1C1917"/></g>
    <g transform="translate(300,300)">
      <circle cx="0" cy="0" r="130" fill="#FFD9C2" stroke="#1C1917" stroke-width="3"/>
      <!-- Spiral -->
      <path d="M 0 0 Q 50 -50 100 0 Q 50 80 -50 30 Q -100 -30 -30 -90 Q 60 -110 100 -40"
            fill="none" stroke="#1C1917" stroke-width="6" opacity="0.7"/>
      <!-- Glaze drizzle -->
      <path d="M -70 -80 Q -50 -50 -80 -20 Q -100 10 -60 30" fill="none" stroke="#FEF3C7" stroke-width="5" stroke-linecap="round"/>
    </g>
  <!-- Brand badge -->
  <g transform="translate(540,560)">
    <circle cx="0" cy="0" r="24" fill="#FEF3C7" opacity="0.95"/>
    <circle cx="0" cy="0" r="14" fill="#1C1917"/>
  </g>
</svg>
