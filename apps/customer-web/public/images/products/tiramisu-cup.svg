<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Tiramisu Cup">

    <defs>
      <radialGradient id="bg" cx="50%" cy="40%" r="80%">
        <stop offset="0%" stop-color="#FFD9C2"/>
        <stop offset="100%" stop-color="#E07856"/>
      </radialGradient>
      <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="6"/>
      </filter>
    </defs>
    <rect width="600" height="600" fill="url(#bg)"/>
    <!-- Subtle noise texture via opacity dots -->
    <g fill="#FEF3C7" opacity="0.05">
      <circle cx="60" cy="80" r="2"/><circle cx="540" cy="120" r="3"/><circle cx="180" cy="540" r="2"/>
      <circle cx="450" cy="480" r="2"/><circle cx="120" cy="260" r="2"/><circle cx="500" cy="320" r="3"/>
    </g>
  

    <g filter="url(#soft-shadow)" opacity="0.18"><ellipse cx="300" cy="450" rx="120" ry="16" fill="#1C1917"/></g>
    <g transform="translate(300,300)">
      <path d="M -90 -100 L 90 -100 L 78 130 Q 78 150 60 150 L -60 150 Q -78 150 -78 130 Z" fill="#FEF3C7" stroke="#1C1917" stroke-width="3"/>
      <rect x="-90" y="-100" width="180" height="20" fill="#1C1917" opacity="0.8"/>
      <rect x="-90" y="-50" width="180" height="40" fill="#E07856" opacity="0.7"/>
      <rect x="-90" y="20" width="180" height="20" fill="#1C1917" opacity="0.8"/>
      <!-- Cocoa dusting on top -->
      <g fill="#1C1917" opacity="0.6">
        <circle cx="-50" cy="-110" r="3"/><circle cx="-20" cy="-115" r="2"/><circle cx="10" cy="-108" r="3"/>
        <circle cx="40" cy="-112" r="2"/><circle cx="60" cy="-105" r="3"/>
      </g>
    </g>
  <!-- Brand badge -->
  <g transform="translate(540,560)">
    <circle cx="0" cy="0" r="24" fill="#FEF3C7" opacity="0.95"/>
    <circle cx="0" cy="0" r="14" fill="#1C1917"/>
  </g>
</svg>
