<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Espresso Romano">

    <defs>
      <radialGradient id="bg" cx="50%" cy="40%" r="80%">
        <stop offset="0%" stop-color="#F4A261"/>
        <stop offset="100%" stop-color="#C2410C"/>
      </radialGradient>
      <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="6"/>
      </filter>
    </defs>
    <rect width="600" height="600" fill="url(#bg)"/>
    <!-- Subtle noise texture via opacity dots -->
    <g fill="#FEF3C7" opacity="0.05">
      <circle cx="60" cy="80" r="2"/><circle cx="540" cy="120" r="3"/><circle cx="180" cy="540" r="2"/>
      <circle cx="450" cy="480" r="2"/><circle cx="120" cy="260" r="2"/><circle cx="500" cy="320" r="3"/>
    </g>
  

    <g filter="url(#soft-shadow)" opacity="0.18"><ellipse cx="300" cy="430" rx="140" ry="20" fill="#1C1917"/></g>
    <g transform="translate(300,310)">
      <ellipse cx="0" cy="0" rx="130" ry="130" fill="#FEF3C7" stroke="#1C1917" stroke-width="3"/>
      <ellipse cx="0" cy="-3" rx="100" ry="100" fill="#1C1917"/>
      <ellipse cx="-15" cy="-25" rx="38" ry="10" fill="#FEF3C7" opacity="0.55"/>
    </g>
  <!-- Brand badge -->
  <g transform="translate(540,560)">
    <circle cx="0" cy="0" r="24" fill="#FEF3C7" opacity="0.95"/>
    <circle cx="0" cy="0" r="14" fill="#1C1917"/>
  </g>
</svg>
