<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" width="360" height="360" role="img" aria-label="Campus pickup">
  <!-- Cup & Co — Onboarding 3 (Campus pickup). Geometric pin with cup, brand-locked palette. -->
  <defs>
    <linearGradient id="ob3-pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4A261"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
    <radialGradient id="ob3-glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#FEF3C7" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FAF6F0" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <!-- Cream backdrop with soft vignette -->
  <rect width="360" height="360" fill="#FEF3C7"/>
  <rect width="360" height="360" fill="url(#ob3-glow)"/>

  <!-- Soft ground shadow under the pin -->
  <ellipse cx="180" cy="298" rx="56" ry="9" fill="#0F766E" fill-opacity="0.18"/>

  <!-- Pin body: classic teardrop with sunrise gradient -->
  <path d="M180 60 C129 60 95 99 95 142 C95 192 154 240 180 290 C206 240 265 192 265 142 C265 99 231 60 180 60 Z"
        fill="url(#ob3-pin)"
        stroke="#1C1917" stroke-opacity="0.06" stroke-width="1.5"/>

  <!-- Inner circle background where the cup sits -->
  <circle cx="180" cy="142" r="46" fill="#FEF3C7"/>

  <!-- Coffee cup body -->
  <path d="M156 140 h40 a4 4 0 0 1 4 4 v22 a14 14 0 0 1 -14 14 h-20 a14 14 0 0 1 -14 -14 v-22 a4 4 0 0 1 4 -4 Z"
        fill="#FAF6F0"
        stroke="#1C1917" stroke-width="2.5"/>

  <!-- Saucer line -->
  <line x1="148" y1="184" x2="212" y2="184" stroke="#1C1917" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cup handle -->
  <path d="M200 146 a10 10 0 0 1 0 16" fill="none" stroke="#1C1917" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Steam wisps -->
  <path d="M168 130 c-3 -6 3 -10 0 -16"  fill="none" stroke="#C2410C" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M180 128 c-3 -6 3 -10 0 -16"  fill="none" stroke="#C2410C" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M192 130 c-3 -6 3 -10 0 -16"  fill="none" stroke="#C2410C" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Highlight glint on pin -->
  <path d="M125 110 q15 -22 42 -28" fill="none" stroke="#FEF3C7" stroke-opacity="0.5" stroke-width="6" stroke-linecap="round"/>
</svg>
