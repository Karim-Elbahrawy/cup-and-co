<svg width="420" height="430" viewBox="0 0 420 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#DDBC6E"/>
      <stop offset="100%" stop-color="#C8A44A"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="260" x2="0" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C8A44A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#9E7C28" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="430" rx="30" fill="url(#bg)"/>
  <rect width="420" height="430" rx="30" fill="url(#fade)"/>

  <!-- Coffee beans — scattered, various sizes/rotations -->
  <!-- Large bean — top right, partially cropped -->
  <g transform="translate(388,52) rotate(38)">
    <ellipse rx="20" ry="12.5" fill="#5A2C0E"/>
    <path d="M0,-10 Q9,0 0,10 Q-9,0 0,-10Z" fill="#3A1A06" opacity="0.45"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#281006" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>
  <!-- Medium bean — top center -->
  <g transform="translate(270,22) rotate(-18)">
    <ellipse rx="15" ry="9" fill="#6B3612"/>
    <path d="M0,-7.5 Q7,0 0,7.5 Q-7,0 0,-7.5Z" fill="#3A1A06" opacity="0.4"/>
    <line x1="-13" y1="0" x2="13" y2="0" stroke="#281006" stroke-width="1.3" stroke-opacity="0.55"/>
  </g>
  <!-- Small bean — top left corner -->
  <g transform="translate(48,42) rotate(60)">
    <ellipse rx="10" ry="6" fill="#7A4020"/>
    <path d="M0,-5 Q4.5,0 0,5 Q-4.5,0 0,-5Z" fill="#3A1A06" opacity="0.38"/>
    <line x1="-8.5" y1="0" x2="8.5" y2="0" stroke="#281006" stroke-width="1" stroke-opacity="0.5"/>
  </g>
  <!-- Medium bean — left side -->
  <g transform="translate(16,195) rotate(-42)">
    <ellipse rx="14" ry="8.5" fill="#6B3612"/>
    <path d="M0,-7 Q6.5,0 0,7 Q-6.5,0 0,-7Z" fill="#3A1A06" opacity="0.4"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#281006" stroke-width="1.2" stroke-opacity="0.5"/>
  </g>
  <!-- Large bean — right side mid -->
  <g transform="translate(410,260) rotate(22)">
    <ellipse rx="17" ry="10.5" fill="#5A2C0E"/>
    <path d="M0,-8.5 Q8,0 0,8.5 Q-8,0 0,-8.5Z" fill="#3A1A06" opacity="0.45"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#281006" stroke-width="1.4" stroke-opacity="0.55"/>
  </g>
  <!-- Large bean — bottom left -->
  <g transform="translate(44,362) rotate(12)">
    <ellipse rx="22" ry="13.5" fill="#5A2C0E"/>
    <path d="M0,-11 Q10,0 0,11 Q-10,0 0,-11Z" fill="#3A1A06" opacity="0.5"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#281006" stroke-width="1.6" stroke-opacity="0.6"/>
  </g>
  <!-- Medium bean — bottom right -->
  <g transform="translate(372,395) rotate(-30)">
    <ellipse rx="16" ry="10" fill="#6B3612"/>
    <path d="M0,-8 Q7,0 0,8 Q-7,0 0,-8Z" fill="#3A1A06" opacity="0.4"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#281006" stroke-width="1.3" stroke-opacity="0.5"/>
  </g>
  <!-- Small bean — right side lower -->
  <g transform="translate(406,355) rotate(65)">
    <ellipse rx="9" ry="5.5" fill="#7A4020"/>
    <path d="M0,-4.5 Q4,0 0,4.5 Q-4,0 0,-4.5Z" fill="#3A1A06" opacity="0.38"/>
    <line x1="-7.5" y1="0" x2="7.5" y2="0" stroke="#281006" stroke-width="1" stroke-opacity="0.45"/>
  </g>
  <!-- Tiny accent bean — bottom center area -->
  <g transform="translate(168,410) rotate(-55)">
    <ellipse rx="8" ry="5" fill="#7A4020"/>
    <path d="M0,-4 Q3.5,0 0,4 Q-3.5,0 0,-4Z" fill="#3A1A06" opacity="0.35"/>
    <line x1="-6.5" y1="0" x2="6.5" y2="0" stroke="#281006" stroke-width="0.9" stroke-opacity="0.4"/>
  </g>

  <!-- HERO TEXT "ICED" — large, dark, behind cup zone -->
  <text
    x="210" y="210"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="168"
    font-weight="900"
    fill="#2A1508"
    fill-opacity="0.86"
    letter-spacing="-3">ICED</text>

  <!-- HERO TEXT "COFFEE" — large, at bottom -->
  <text
    x="210" y="400"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="112"
    font-weight="900"
    fill="#2A1508"
    fill-opacity="0.86"
    letter-spacing="-2">COFFEE</text>

  <!-- Brand name — top left -->
  <text
    x="26" y="32"
    font-family="'Sora', 'Inter', 'Arial', sans-serif"
    font-size="11.5"
    font-weight="800"
    fill="#2A1508"
    fill-opacity="0.65"
    letter-spacing="2.8">CUP &amp; CO</text>

  <!-- Offer badge — top right circle -->
  <circle cx="374" cy="60" r="40" fill="#2A1508" fill-opacity="0.85"/>
  <circle cx="374" cy="60" r="37.5" fill="none" stroke="#DDBC6E" stroke-width="1.5" stroke-opacity="0.45"/>
  <text x="374" y="53"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="19" font-weight="900"
    fill="#F0CC60">10%</text>
  <text x="374" y="72"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="15" font-weight="900"
    fill="#F0CC60">OFF</text>

  <!-- CTA line — bottom left -->
  <text x="26" y="420"
    font-family="'Sora', 'Inter', Arial, sans-serif"
    font-size="9.5" font-weight="700"
    fill="#2A1508" fill-opacity="0.50"
    letter-spacing="2">ORDER NOW · THIS WEEKEND</text>

  <!-- Subtle border -->
  <rect x="2" y="2" width="416" height="426" rx="29"
    stroke="#2A1508" stroke-width="1" stroke-opacity="0.1" fill="none"/>
</svg>
