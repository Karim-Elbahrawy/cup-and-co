<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="Cup &amp; Co">
  <defs>
    <linearGradient id="m-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4A261"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
  </defs>
  <!-- Saucer (subtle outer ring) -->
  <circle cx="48" cy="52" r="40" fill="#FAF6F0"/>
  <circle cx="48" cy="52" r="40" fill="none" stroke="#E7E5E4" stroke-width="1.5"/>
  <!-- Cup body (top-down view) -->
  <circle cx="48" cy="52" r="30" fill="url(#m-grad)"/>
  <circle cx="48" cy="52" r="30" fill="none" stroke="#9A3412" stroke-width="1"/>
  <!-- Coffee surface with crema -->
  <circle cx="48" cy="52" r="22" fill="#1C1917"/>
  <ellipse cx="48" cy="49" rx="16" ry="4" fill="#FEF3C7" opacity="0.55"/>
  <!-- Steam (3 wavy strands in deep teal) -->
  <g stroke="#0F766E" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M36 18 C 33 22, 39 26, 36 32"/>
    <path d="M48 14 C 45 19, 51 24, 48 30"/>
    <path d="M60 18 C 57 22, 63 26, 60 32"/>
  </g>
</svg>
