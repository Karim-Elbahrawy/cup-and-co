<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none">
  <!-- The Chill — messy medium hair, mustard hoodie, relaxed half-lidded eyes -->

  <!-- Messy hair (medium brown, tousled) -->
  <ellipse cx="80" cy="88" rx="50" ry="54" fill="#6B3E1E"/>
  <!-- Hair tufts / messiness -->
  <path d="M54 50 Q58 38 66 46 Q62 38 72 40 Q68 34 80 38 Q88 32 92 40 Q98 36 96 46 Q104 40 108 52" stroke="#7D4A26" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M36 72 Q34 60 42 58 Q40 70 36 72Z" fill="#6B3E1E"/>
  <path d="M124 72 Q126 60 118 58 Q120 70 124 72Z" fill="#6B3E1E"/>

  <!-- Face -->
  <ellipse cx="80" cy="100" rx="44" ry="52" fill="#C87B50"/>

  <!-- Ears -->
  <ellipse cx="36" cy="102" rx="8" ry="11" fill="#C87B50"/>
  <ellipse cx="124" cy="102" rx="8" ry="11" fill="#C87B50"/>
  <ellipse cx="36" cy="102" rx="5" ry="7" fill="#A06038"/>
  <ellipse cx="124" cy="102" rx="5" ry="7" fill="#A06038"/>

  <!-- Small earbuds -->
  <circle cx="36" cy="98" r="4.5" fill="#E0E0E0"/>
  <circle cx="36" cy="98" r="2.5" fill="#C0C0C0"/>

  <!-- Eyebrows (relaxed, slightly droopy outside) -->
  <path d="M57 87 Q64 82 72 85" stroke="#3D1E0A" stroke-width="2.4" stroke-linecap="round" fill="none"/>
  <path d="M88 85 Q95 82 103 87" stroke="#3D1E0A" stroke-width="2.4" stroke-linecap="round" fill="none"/>

  <!-- Eye whites (half-lidded / relaxed) -->
  <ellipse cx="65" cy="96" rx="9" ry="8" fill="#FEFCFA"/>
  <ellipse cx="95" cy="96" rx="9" ry="8" fill="#FEFCFA"/>
  <!-- Half-lid overlay -->
  <path d="M56 92 Q65 88 74 92 L74 97 Q65 94 56 97Z" fill="#C87B50" fill-opacity="0.55"/>
  <path d="M86 92 Q95 88 104 92 L104 97 Q95 94 86 97Z" fill="#C87B50" fill-opacity="0.55"/>

  <!-- Pupils -->
  <circle cx="65" cy="97" r="4.8" fill="#1C1008"/>
  <circle cx="95" cy="97" r="4.8" fill="#1C1008"/>
  <circle cx="67" cy="95.5" r="1.8" fill="white"/>
  <circle cx="97" cy="95.5" r="1.8" fill="white"/>

  <!-- Nose -->
  <path d="M76 111 Q80 116 84 111" stroke="#9A5A30" stroke-width="1.6" fill="none" stroke-linecap="round"/>

  <!-- Chill relaxed smile -->
  <path d="M70 122 Q80 129 90 122" stroke="#884428" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Neck -->
  <path d="M66 148 L66 162 Q80 166 94 162 L94 148 Q88 140 80 138 Q72 140 66 148Z" fill="#C87B50"/>

  <!-- Mustard hoodie -->
  <path d="M8 200 L10 175 C20 158 46 152 62 158 L80 166 L98 158 C114 152 140 158 150 175 L152 200Z" fill="#C9902A"/>
  <!-- Hood drawstring at neck -->
  <path d="M68 158 Q80 170 92 158" stroke="#A8760E" stroke-width="2" fill="none"/>
  <!-- Kangaroo pocket line -->
  <path d="M55 185 Q80 183 105 185" stroke="#A8760E" stroke-width="2" stroke-linecap="round" fill="none"/>
</svg>
