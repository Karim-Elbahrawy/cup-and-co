  <!-- White collar -->
  <path d="M46 200 L64 157 L80 170 L96 157 L114 200Z" fill="#EEE8E0"/>
  <path d="M64 157 L80 170 L96 157" stroke="#CCC6BC" stroke-width="1.2" fill="none"/>

  <!-- Navy sweater -->
  <path d="M8 200 L46 200 L64 157 C48 150 20 156 10 172Z" fill="#1D3868"/>
  <path d="M152 200 L114 200 L96 157 C112 150 140 156 150 172Z" fill="#1D3868"/>
  <path d="M8 200 L10 172 C20 156 48 150 64 157 L80 164 L96 157 C112 150 140 156 150 172 L152 200Z" fill="#1D3868"/>
