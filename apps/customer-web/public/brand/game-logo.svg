<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Coffee Collector game logo">
  <!-- Cup & Co — Coffee Collector game logo. Bean + cup motif on sunrise. -->
  <defs>
    <linearGradient id="gl-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4A261"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
    <radialGradient id="gl-shine" cx="0.3" cy="0.25" r="0.5">
      <stop offset="0%" stop-color="#FEF3C7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FEF3C7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Rounded square chip -->
  <rect width="200" height="200" rx="40" fill="url(#gl-bg)"/>
  <rect width="200" height="200" rx="40" fill="url(#gl-shine)"/>

  <!-- Coffee bean: oval with split groove -->
  <g transform="translate(58 60)">
    <ellipse cx="0" cy="0" rx="36" ry="50" transform="rotate(-18)" fill="#1C1917" stroke="#1C1917"/>
    <path d="M-2 -42 C-12 -20 -16 0 -10 22 C-4 38 4 42 8 42"
          fill="none" stroke="#FAF6F0" stroke-width="3.5" stroke-linecap="round" transform="rotate(-18)"/>
  </g>

  <!-- Cup, foreground right -->
  <g transform="translate(110 110)">
    <!-- Cup body -->
    <path d="M-30 -22 h60 v18 a22 22 0 0 1 -22 22 h-16 a22 22 0 0 1 -22 -22 Z"
          fill="#FAF6F0"
          stroke="#1C1917" stroke-width="3" stroke-linejoin="round"/>
    <!-- Saucer -->
    <ellipse cx="0" cy="22" rx="36" ry="6" fill="#FAF6F0" stroke="#1C1917" stroke-width="3"/>
    <!-- Handle -->
    <path d="M30 -16 a14 14 0 0 1 0 22" fill="none" stroke="#1C1917" stroke-width="3" stroke-linecap="round"/>
    <!-- Steam wisps -->
    <g stroke="#FEF3C7" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.95">
      <path d="M-12 -32 c-3 -7 3 -12 0 -18"/>
      <path d="M0 -36 c-3 -7 3 -12 0 -18"/>
      <path d="M12 -32 c-3 -7 3 -12 0 -18"/>
    </g>
  </g>
</svg>
