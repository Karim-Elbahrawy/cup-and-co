<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Empty cart">
  <!-- Cup & Co — Empty cart. Tilted paper cup with steam wisps. Brand-locked palette. -->
  <defs>
    <linearGradient id="ec-stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4A261"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
    <linearGradient id="ec-sleeve" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4A261" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#C2410C" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="ec-glow" cx="0.5" cy="0.55" r="0.7">
      <stop offset="0%" stop-color="#FEF3C7" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FAF6F0" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <!-- Cream backdrop -->
  <rect width="240" height="240" fill="#FEF3C7"/>
  <rect width="240" height="240" fill="url(#ec-glow)"/>

  <!-- Soft ground shadow under the cup, rotated to match cup's tilt -->
  <ellipse cx="124" cy="200" rx="58" ry="6" fill="#0F766E" fill-opacity="0.14"/>

  <!-- Tilted paper cup, rotated -8deg, centered around (120,130) -->
  <g transform="rotate(-8 120 130)">
    <!-- Cup body: trapezoid (wider at top, narrower at bottom) -->
    <path d="M82 90 L158 90 L150 198 L90 198 Z"
          fill="#FAF6F0"
          stroke="url(#ec-stroke)" stroke-width="3" stroke-linejoin="round"/>

    <!-- Lip detail at top of cup -->
    <ellipse cx="120" cy="90" rx="38" ry="6" fill="#FAF6F0" stroke="url(#ec-stroke)" stroke-width="3"/>

    <!-- Cardboard sleeve, sunrise gradient -->
    <path d="M86 124 L154 124 L151 162 L89 162 Z"
          fill="url(#ec-sleeve)"
          stroke="#C2410C" stroke-width="0" stroke-opacity="0.4"/>

    <!-- Subtle ribbed corrugation lines on the sleeve -->
    <g stroke="#FEF3C7" stroke-width="1" stroke-opacity="0.55" stroke-linecap="round">
      <line x1="92" y1="130" x2="148" y2="130"/>
      <line x1="93" y1="138" x2="147" y2="138"/>
      <line x1="93" y1="146" x2="147" y2="146"/>
      <line x1="92" y1="154" x2="148" y2="154"/>
    </g>
  </g>

  <!-- Steam wisps rising from the cup top -->
  <g stroke="#C2410C" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M104 70 c-4 -10 6 -16 0 -28" />
    <path d="M122 64 c-4 -10 6 -16 0 -28" />
    <path d="M140 70 c-4 -10 6 -16 0 -28" />
  </g>
</svg>
