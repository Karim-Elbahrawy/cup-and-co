<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none">
  <!-- The Creative — big wild hair, angular flat style -->

  <!-- Denim jacket block -->
  <path d="M0 200 L0 170 C26 156 56 153 70 159 L80 163 L90 159 C104 153 134 156 160 170 L160 200Z" fill="#3A5478"/>
  <!-- Jacket lapels -->
  <path d="M70 159 L76 173 L80 163" fill="#2C4060"/>
  <path d="M90 159 L84 173 L80 163" fill="#2C4060"/>
  <!-- Orange pin -->
  <circle cx="68" cy="171" r="5.5" fill="#D45800"/>
  <circle cx="68" cy="171" r="3" fill="#F06820"/>

  <!-- Neck -->
  <rect x="64" y="151" width="32" height="13" rx="2" fill="#D8A878"/>

  <!-- BIG wild curly hair — dominant silhouette -->
  <ellipse cx="80" cy="74" rx="62" ry="58" fill="#8A3C1A"/>
  <circle cx="20" cy="78" r="18" fill="#8A3C1A"/>
  <circle cx="140" cy="78" r="18" fill="#8A3C1A"/>
  <circle cx="32" cy="50" r="16" fill="#9E4A22"/>
  <circle cx="128" cy="50" r="16" fill="#9E4A22"/>
  <circle cx="58" cy="28" r="18" fill="#9E4A22"/>
  <circle cx="102" cy="28" r="18" fill="#9E4A22"/>
  <circle cx="80" cy="18" r="20" fill="#9E4A22"/>
  <circle cx="16" cy="100" r="14" fill="#8A3C1A"/>
  <circle cx="144" cy="100" r="14" fill="#8A3C1A"/>

  <!-- Teal beret -->
  <ellipse cx="84" cy="54" rx="30" ry="10" fill="#0A7888" transform="rotate(-10 84 54)"/>
  <ellipse cx="84" cy="51" rx="26" ry="12" fill="#0C9AB0" transform="rotate(-10 84 51)"/>
  <circle cx="91" cy="42" r="5" fill="#0A7888"/>

  <!-- Angular face polygon -->
  <polygon points="38,64 116,60 122,98 114,152 80,168 46,156 36,112" fill="#D8A878"/>

  <!-- Right ear -->
  <path d="M118,98 Q132,104 132,116 Q132,128 118,132" stroke="#D8A878" stroke-width="11" fill="none" stroke-linecap="round"/>
  <path d="M120,102 Q128,108 128,116 Q128,124 120,128" stroke="#BE8A60" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Eyebrows — expressive arched -->
  <path d="M54 88 Q65 82 74 86" stroke="#3A1A08" stroke-width="2.6" stroke-linecap="round" fill="none"/>
  <path d="M88 86 Q97 82 108 88" stroke="#3A1A08" stroke-width="2.6" stroke-linecap="round" fill="none"/>

  <!-- Eyes — dreamy -->
  <ellipse cx="64" cy="98" rx="7" ry="6.5" fill="#1C0E08"/>
  <ellipse cx="96" cy="96" rx="8" ry="7.5" fill="#1C0E08"/>
  <circle cx="66" cy="96" r="2" fill="white" opacity="0.7"/>
  <circle cx="98" cy="94" r="2.2" fill="white" opacity="0.7"/>

  <!-- Nose -->
  <path d="M77 114 Q81 120 85 117" stroke="#A87850" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Soft smile -->
  <path d="M66 132 Q80 140 94 132" stroke="#7A4828" stroke-width="2.2" fill="none" stroke-linecap="round"/>
</svg>
