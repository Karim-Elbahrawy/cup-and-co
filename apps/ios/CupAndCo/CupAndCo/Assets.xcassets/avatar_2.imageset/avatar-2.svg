<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none">
  <!-- The Athlete — angular flat style -->

  <!-- Jersey block — rust orange -->
  <path d="M0 200 L0 170 C26 156 56 153 70 159 L80 163 L90 159 C104 153 134 156 160 170 L160 200Z" fill="#C24A1A"/>
  <!-- V-neck -->
  <path d="M70 159 L80 171 L90 159" stroke="#A83A10" stroke-width="2" fill="none"/>
  <!-- Jersey stripes -->
  <line x1="50" y1="156" x2="42" y2="200" stroke="white" stroke-width="5" stroke-opacity="0.3"/>
  <line x1="110" y1="156" x2="118" y2="200" stroke="white" stroke-width="5" stroke-opacity="0.3"/>

  <!-- Neck -->
  <rect x="64" y="151" width="32" height="13" rx="2" fill="#7A4020"/>

  <!-- Hair — very short, dark -->
  <path d="M32 60 Q38 22 80 20 Q122 22 128 60 Q126 72 124 82 L118 80 Q116 60 80 58 Q44 60 42 80 L36 82 Q34 72 32 60Z" fill="#0A0604"/>
  <path d="M32 60 Q28 78 30 100 Q34 104 40 102 Q38 84 42 68Z" fill="#0A0604"/>

  <!-- Orange headband -->
  <rect x="30" y="72" width="100" height="13" rx="6" fill="#D45800"/>
  <rect x="30" y="72" width="100" height="6" rx="3" fill="#E86C20"/>

  <!-- Angular face polygon — wider, athletic -->
  <polygon points="32,60 122,56 128,94 120,148 80,164 40,152 30,108" fill="#7A4020"/>

  <!-- Right ear -->
  <path d="M122,94 Q136,100 136,112 Q136,124 122,128" stroke="#7A4020" stroke-width="11" fill="none" stroke-linecap="round"/>
  <path d="M124,98 Q132,104 132,112 Q132,120 124,124" stroke="#5E2E12" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Eyebrows — bold, raised/energetic -->
  <path d="M50 83 Q64 77 74 80" stroke="#050202" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <path d="M88 80 Q98 77 112 83" stroke="#050202" stroke-width="3.2" stroke-linecap="round" fill="none"/>

  <!-- Eyes — wide open -->
  <ellipse cx="62" cy="96" rx="8" ry="7.5" fill="#0E0804"/>
  <ellipse cx="96" cy="94" rx="9" ry="8.5" fill="#0E0804"/>
  <circle cx="65" cy="93" r="2.2" fill="white" opacity="0.75"/>
  <circle cx="99" cy="91" r="2.5" fill="white" opacity="0.75"/>

  <!-- Nose -->
  <path d="M77 112 Q81 118 85 115" stroke="#5E2E12" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Big open smile -->
  <path d="M58 126 Q80 143 102 126" stroke="#3A1408" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M61 127 Q80 141 99 127 Q90 136 80 138 Q70 136 61 127Z" fill="white"/>
</svg>
