<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none">
  <!-- The Scholar — angular flat style -->

  <!-- Sweater block -->
  <path d="M0 200 L0 170 C26 156 56 153 70 159 L80 163 L90 159 C104 153 134 156 160 170 L160 200Z" fill="#1E2E52"/>
  <!-- White collar -->
  <path d="M64 158 L72 172 L80 163 L88 172 L96 158" fill="#EDE8DC"/>

  <!-- Neck -->
  <rect x="64" y="151" width="32" height="13" rx="2" fill="#C49268"/>

  <!-- Hair — deep navy, neat, blocky -->
  <path d="M26 64 Q32 20 80 18 Q128 20 134 64 Q132 80 130 92 L124 90 Q118 66 80 64 Q42 66 36 90 L30 92 Q28 80 26 64Z" fill="#1A2240"/>
  <path d="M26 64 Q22 84 24 110 Q28 114 36 112 Q32 92 36 74Z" fill="#1A2240"/>

  <!-- Angular face polygon -->
  <polygon points="36,62 118,58 124,96 116,150 80,164 44,154 34,110" fill="#C49268"/>

  <!-- Right ear -->
  <path d="M120,96 Q134,102 134,114 Q134,126 120,130" stroke="#C49268" stroke-width="11" fill="none" stroke-linecap="round"/>
  <path d="M122,100 Q130,106 130,114 Q130,122 122,126" stroke="#AE7A50" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Eyebrows — bold, flat -->
  <line x1="53" y1="82" x2="71" y2="79" stroke="#180E06" stroke-width="3" stroke-linecap="square"/>
  <line x1="87" y1="79" x2="105" y2="82" stroke="#180E06" stroke-width="3" stroke-linecap="square"/>

  <!-- Eyes — angular flat dots -->
  <ellipse cx="62" cy="96" rx="7" ry="6" fill="#180E06"/>
  <ellipse cx="95" cy="94" rx="8" ry="7" fill="#180E06"/>
  <circle cx="64" cy="94" r="2" fill="white" opacity="0.7"/>
  <circle cx="97" cy="92" r="2.2" fill="white" opacity="0.7"/>

  <!-- Rectangular glasses -->
  <rect x="51" y="88" width="22" height="15" rx="2.5" fill="none" stroke="#180E06" stroke-width="2.2"/>
  <rect x="83" y="86" width="26" height="15" rx="2.5" fill="none" stroke="#180E06" stroke-width="2.2"/>
  <line x1="73" y1="95" x2="83" y2="94" stroke="#180E06" stroke-width="2.2"/>
  <line x1="51" y1="94" x2="40" y2="92" stroke="#180E06" stroke-width="2"/>
  <line x1="109" y1="92" x2="120" y2="95" stroke="#180E06" stroke-width="2"/>

  <!-- Nose — minimal mark -->
  <path d="M77 113 Q81 119 85 116" stroke="#9A6840" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Mouth — composed -->
  <path d="M65 131 Q80 138 95 131" stroke="#784428" stroke-width="2.2" fill="none" stroke-linecap="round"/>
</svg>
