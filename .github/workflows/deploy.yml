name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-api:
    name: Deploy API to Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s --fail "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            || echo "Render deploy hook not set — skipping"

  deploy-customer-web:
    name: Deploy customer-web to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel
        working-directory: apps/customer-web
        run: npx vercel --token "${{ secrets.VERCEL_TOKEN }}" --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CUSTOMER }}

  deploy-admin:
    name: Deploy admin to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel
        working-directory: apps/admin
        run: npx vercel --token "${{ secrets.VERCEL_TOKEN }}" --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}

  deploy-kiosk:
    name: Deploy kiosk to Vercel
    runs-on: ubuntu-latest
    # No-ops cleanly until VERCEL_PROJECT_ID_KIOSK is set in repo secrets,
    # so the rest of the workflow keeps deploying while the kiosk Vercel
    # project is still being provisioned. See docs/KIOSK-PLAN.md K0.2.
    steps:
      - uses: actions/checkout@v4

      - name: Skip if kiosk project not configured
        id: gate
        run: |
          if [ -z "${{ secrets.VERCEL_PROJECT_ID_KIOSK }}" ]; then
            echo "VERCEL_PROJECT_ID_KIOSK not set — skipping kiosk deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.gate.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel
        if: steps.gate.outputs.skip != 'true'
        working-directory: apps/kiosk
        run: npx vercel --token "${{ secrets.VERCEL_TOKEN }}" --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_KIOSK }}
