name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck packages
        run: pnpm typecheck

      - name: Run backend tests
        run: pnpm --filter @cup-and-co/api test

      - name: Build apps
        run: pnpm --filter @cup-and-co/api --filter @cup-and-co/customer-web --filter @cup-and-co/admin build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

  e2e:
    name: Customer web E2E (Playwright)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cup-and-co/customer-web exec playwright install --with-deps chromium
      - run: pnpm --filter @cup-and-co/customer-web test:e2e
        env:
          CI: '1'
          NEXT_PUBLIC_API_URL: http://localhost:4000

  admin-e2e:
    name: Admin dashboard E2E (Playwright)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cup-and-co/admin exec playwright install --with-deps chromium
      - run: pnpm --filter @cup-and-co/admin test:e2e
        env:
          CI: '1'
          NEXT_PUBLIC_API_URL: http://localhost:4000

  ios-build:
    name: iOS build (smoke)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Xcode project
        working-directory: apps/ios/CupAndCo
        run: |
          brew install xcodegen
          xcodegen generate
      - name: Build iOS project
        working-directory: apps/ios/CupAndCo
        run: |
          xcodebuild -project CupAndCo.xcodeproj \
            -scheme CupAndCo \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration Debug \
            build
